- name: Rebecca Stevens-Green
  nick_name: Becca
  arrival: 02/2026
  length_of_stay: 8 weeks
  title: "Graduate Student"
  department: Department of Biology
  institute: Dalhousie University
  dept_link: https://www.dal.ca/faculty/science/biology.html
  country_flag: 🇨🇦
  notes: "For her visit, Becca secured an <a href=https://nserc-crsng.canada.ca/en/funding-opportunity/canada-graduate-scholarships-michael-smith-foreign-study-supplements>NSERC MSFSS Scholarship</a>; a program by the Government of Canada to, in their own words, <i>support high-caliber graduate students in building global linkages and international networks through the pursuit of exceptional research experiences at research institutions outside of Canada</i>. While with us, Becca focused on the analysis of datasets she generated under Prof. Dr. Julie Laroche's supervision to study phytoplankton blooms in the Labrador Sea."
  photos:
    - caption: Becca during an impromptu discussion with the rest of the group.
      url: /images/visitors/2026_becca.jpg

- name: Amy D Willis
  nick_name: Amy
  arrival: 09/2024
  length_of_stay: "9 months"
  title: Professor
  department: Department of Biostatistics
  dept_link: https://www.biostat.washington.edu/
  pers_link: https://statdivlab.github.io/
  institute: University of Washington
  country_flag: 🇺🇸
  notes: "Amy's visit was more than a visit -- it was a true sabbatical during which we took advantage of the new genomes in public databases to investigate the codon variation landscape throughout the tree of life as a function of microbial ecology, evolution, and metabolism. Members of our group is forever thankful to the members of <a href='https://statdivlab.github.io/' id='aff-link' target='_blank'>Amy's group</a> for sharing her with us"

